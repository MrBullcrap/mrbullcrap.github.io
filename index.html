<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>8-Ball Pool</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  background:#0f0a04;
  overflow:hidden;
  touch-action:none;
  user-select:none;-webkit-user-select:none;
  font-family:'Georgia',serif;
}
#gameCanvas{
  display:block;position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  touch-action:none;
}
#overlay{
  position:fixed;inset:0;
  background:rgba(5,3,1,.9);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:200;color:#f0e6c8;
}
#overlay h1{
  font-size:clamp(2rem,7vw,4.5rem);
  color:#d4a017;
  text-shadow:0 0 40px rgba(212,160,23,.7);
  letter-spacing:6px;margin-bottom:.4rem;
}
#overlay .sub{
  font-size:clamp(.75rem,2.2vw,1.1rem);
  color:#9a8060;margin-bottom:1.6rem;
  text-align:center;max-width:380px;
  padding:0 1rem;line-height:1.7;
}
.obtn{
  background:linear-gradient(135deg,#d4a017,#8b6410);
  border:2px solid #d4a017;color:#1a0f02;
  font-family:'Georgia',serif;
  font-size:clamp(.95rem,3vw,1.35rem);
  font-weight:bold;padding:.7em 2.2em;
  border-radius:4px;cursor:pointer;
  letter-spacing:2px;text-transform:uppercase;
  transition:all .18s;
  box-shadow:0 4px 18px rgba(212,160,23,.45);
}
.obtn:hover,.obtn:active{
  background:linear-gradient(135deg,#f0c040,#d4a017);
  transform:scale(1.06);
  box-shadow:0 6px 24px rgba(212,160,23,.65);
}
#winText{
  font-size:clamp(1.4rem,5.5vw,3.2rem);
  color:#d4a017;
  text-shadow:0 0 24px rgba(212,160,23,.9);
  margin-bottom:1.1rem;text-align:center;
}
#hud{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 14px 6px;
  background:rgba(10,6,2,.85);
  border-top:1px solid rgba(212,160,23,.22);
  z-index:100;pointer-events:none;
}
.pi{display:flex;align-items:center;gap:7px;font-size:clamp(.68rem,2vw,.9rem)}
.pl{color:#9a8060;font-size:.82em}
.pi.act .pl{color:#d4a017}
.brow{display:inline-flex;gap:3px;align-items:center}
.bd{
  width:11px;height:11px;border-radius:50%;
  display:inline-block;border:1px solid rgba(255,255,255,.2);
  transition:all .3s;
}
#ti{
  color:#e8dfc0;font-size:clamp(.7rem,2.2vw,.95rem);
  text-align:center;flex:1;
}
#fb{
  position:fixed;top:14px;left:50%;
  transform:translateX(-50%);
  background:rgba(180,30,30,.93);color:#fff;
  padding:7px 22px;border-radius:6px;
  font-size:clamp(.75rem,2.3vw,.95rem);
  pointer-events:none;opacity:0;
  transition:opacity .3s;white-space:nowrap;
  z-index:150;border:1px solid rgba(255,100,100,.4);
  max-width:90vw;text-align:center;
}
#fb.show{opacity:1}
#pw{
  position:fixed;bottom:52px;left:50%;
  transform:translateX(-50%);
  width:min(220px,44vw);z-index:110;
  pointer-events:none;opacity:0;transition:opacity .2s;
}
#pw.show{opacity:1}
#pwl{color:#d4a017;font-size:.72rem;text-align:center;margin-bottom:3px;letter-spacing:1px}
#pwtk{
  height:8px;background:rgba(0,0,0,.55);
  border:1px solid rgba(212,160,23,.35);
  border-radius:4px;overflow:hidden;
}
#pwf{
  height:100%;width:0%;
  background:linear-gradient(90deg,#27ae60,#f39c12,#e74c3c);
  border-radius:4px;transition:width .06s;
}
#bihh{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  color:#f0e6c8;font-size:clamp(.8rem,2.8vw,1rem);
  background:rgba(0,0,0,.78);
  padding:7px 18px;border-radius:5px;
  pointer-events:none;opacity:0;z-index:130;
  border:1px solid rgba(212,160,23,.3);text-align:center;
}
#bihh.show{opacity:1}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="hud">
  <div class="pi" id="pi1"><span class="pl">P1</span><span class="brow" id="br1"></span></div>
  <div id="ti">Break!</div>
  <div class="pi" id="pi2"><span class="brow" id="br2"></span><span class="pl">P2</span></div>
</div>

<div id="fb"></div>
<div id="pw"><div id="pwl">POWER</div><div id="pwtk"><div id="pwf"></div></div></div>
<div id="bihh">Tap anywhere on the table to place the cue ball</div>

<div id="overlay">
  <h1>8-BALL POOL</h1>
  <p class="sub">Drag the cue backward to aim and set power.<br>Further back = more power. Release to shoot.</p>
  <button class="obtn" onclick="startGame()">BREAK!</button>
</div>

<script>
/* ════════════════════════════════════════════════════
   CONSTANTS
════════════════════════════════════════════════════ */
const ASSET        = 'https://raw.githubusercontent.com/MrBullcrap/mrbullcrap.github.io/main/assets/';
const FRICTION     = 0.9875;
const CUSHION_REST = 0.72;
const BALL_REST    = 0.95;
const MIN_SPEED    = 0.12;
const BALL_R_FRAC  = 1/56;      // ≈0.01786 → ~1.6× real BCA scale (real: 1.125/100=0.01125)
const CANVAS_AR    = 4551/2570; // table.png natural aspect ratio
const HUD_H        = 44;
const MAX_POWER    = 15;
const STRIKE_MS    = 90;    // cue-forward animation duration on release
const SINK_MS      = 380;   // pocket-drop animation duration

const SOLIDS  = [1,2,3,4,5,6,7];
const STRIPES = [9,10,11,12,13,14,15];

const BCOL = {
   0:'#f5f4ee', 1:'#f7c832', 2:'#1e5fac', 3:'#c42020',
   4:'#6a24a0', 5:'#e07218', 6:'#1e8028', 7:'#8c3018',
   8:'#111',    9:'#f7c832',10:'#1e5fac',11:'#c42020',
  12:'#6a24a0',13:'#e07218',14:'#1e8028',15:'#8c3018',
};

/* ════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════ */
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

// Layout
let W, H, tX, tY, tW, tH, ballR, pocketR, headX;
let pockets = [];

// Game
let balls=[], gs='menu', curP=1;
let groups={1:null,2:null};
let tableOpen=true, breakShot=true;
let pottedNow=[], firstHit=null, railHit=false, hasFoul=false;

// Input
let aiming=false, aimPos=null;
let bih=false, bihPos=null;

// Settling guard
let settling=false;

// Sprites
let sprBalls={}, sprCue=null, sprTable=null, tableCalib=null;
let foulTmr=null;

// Animations / audio
let strikeAnim=null;        // {cx,cy,dragAngle,tipDist0,startMs}
let kitchen=false;          // restrict BIH to behind head string
let lastBallSnd=0, lastCushionSnd=0;

/* ════════════════════════════════════════════════════
   ASSETS
════════════════════════════════════════════════════ */
function loadAssets(){
  return new Promise(res=>{
    let need=18, done=0;
    const tick=()=>{ if(++done>=need) res(); };
    for(let i=0;i<=15;i++){
      const img=new Image(); img.crossOrigin='anonymous';
      img.onload=img.onerror=tick;
      img.src=ASSET+'pool_ball_outline_'+i+'.png';
      sprBalls[i]=img;
    }
    sprCue=new Image(); sprCue.crossOrigin='anonymous';
    sprCue.onload=sprCue.onerror=tick;
    sprCue.src=ASSET+'pool_cue.png';

    sprTable=new Image(); sprTable.crossOrigin='anonymous';
    sprTable.onload=()=>{
      tableCalib=calibrateTable(sprTable);
      tick();
    };
    sprTable.onerror=tick;
    sprTable.src=ASSET+'table.png';
  });
}

/* ════════════════════════════════════════════════════
   AUDIO  (Web Audio API synthesis — no external files)
════════════════════════════════════════════════════ */
let _ac=null;
function _getAC(){
  if(!_ac) try{_ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  return _ac;
}
function sndHit(vol=1){
  const a=_getAC(); if(!a) return;
  try{
    const t=a.currentTime;
    const len=Math.ceil(a.sampleRate*0.045);
    const buf=a.createBuffer(1,len,a.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,3);
    const src=a.createBufferSource(); src.buffer=buf;
    const f=a.createBiquadFilter(); f.type='bandpass'; f.frequency.value=2400; f.Q.value=0.7;
    const g=a.createGain(); g.gain.setValueAtTime(Math.min(1,vol)*1.1,t);
    src.connect(f); f.connect(g); g.connect(a.destination); src.start(t);
  }catch(e){}
}
function sndCushion(){
  const a=_getAC(); if(!a) return;
  try{
    const t=a.currentTime;
    const o=a.createOscillator(); o.type='sine';
    o.frequency.setValueAtTime(170,t); o.frequency.exponentialRampToValueAtTime(55,t+0.13);
    const g=a.createGain();
    g.gain.setValueAtTime(0.28,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
    o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+0.16);
  }catch(e){}
}
function sndPocket(){
  const a=_getAC(); if(!a) return;
  try{
    const t=a.currentTime, dur=0.32;
    const len=Math.ceil(a.sampleRate*dur);
    const buf=a.createBuffer(1,len,a.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,1.4)*0.8;
    const src=a.createBufferSource(); src.buffer=buf;
    const f=a.createBiquadFilter(); f.type='lowpass';
    f.frequency.setValueAtTime(900,t); f.frequency.exponentialRampToValueAtTime(80,t+dur);
    const g=a.createGain(); g.gain.setValueAtTime(0.6,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    src.connect(f); f.connect(g); g.connect(a.destination); src.start(t);
  }catch(e){}
}

/* ════════════════════════════════════════════════════
   AIM RAY — find first object ball in shoot direction
════════════════════════════════════════════════════ */
function findFirstHit(ox,oy,ddx,ddy){
  let minT=Infinity, hitBall=null;
  for(const b of balls){
    if(!b.active||b.num===0) continue;
    const ex=b.x-ox, ey=b.y-oy;
    const proj=ex*ddx+ey*ddy;
    if(proj<=0) continue;
    const perp2=ex*ex+ey*ey-proj*proj;
    const r2=4*ballR*ballR;
    if(perp2>=r2) continue;
    const t=proj-Math.sqrt(r2-perp2);
    if(t>0&&t<minT){minT=t;hitBall=b;}
  }
  return hitBall?{t:minT,ball:hitBall}:null;
}

/* ════════════════════════════════════════════════════
   TABLE CALIBRATION
   Auto-detects felt bounds and pocket positions from
   pixel colours in table.png:
     black pixels  (R<30, G<30, B<30)  → pockets
     dark green    (G dominant, below median brightness) → felt
     light green   (G dominant, above median brightness) → rail
════════════════════════════════════════════════════ */
function calibrateTable(img){
  const SCALE=0.1;
  const sw=Math.max(1,Math.round(img.naturalWidth*SCALE));
  const sh=Math.max(1,Math.round(img.naturalHeight*SCALE));
  const oc=document.createElement('canvas'); oc.width=sw; oc.height=sh;
  const ox=oc.getContext('2d',{willReadFrequently:true});
  ox.drawImage(img,0,0,sw,sh);
  const data=ox.getImageData(0,0,sw,sh).data;

  // Per-column and per-row counts of rail-bright pixels.
  // Rail green: green-dominant AND brightness in [90,100].
  // The table sprite has a clear bimodal gap: felt peaks at 60-74, rail at 95-99,
  // and a center spotlight at 100+ — capping at 100 excludes the spotlight.
  const colRail=new Int32Array(sw);
  const rowRail=new Int32Array(sh);

  for(let y=0;y<sh;y++){
    for(let x=0;x<sw;x++){
      const i=(y*sw+x)*4;
      const r=data[i],g=data[i+1],b=data[i+2];
      const bright=(r+g+b)/3;
      if(g>r*1.15&&g>b*1.15&&bright>=90&&bright<=100){
        colRail[x]++;
        rowRail[y]++;
      }
    }
  }

  // "Enter-then-exit" scan: find where the solid rail band ends on each side.
  // Scan from the outside inward; wait for rail density to exceed HIGH (we're
  // inside the rail), then stop when it drops below LOW (inner edge reached).
  const HIGH=0.3, LOW=0.05;
  const cFrac=x=>colRail[x]/sh, rFrac=y=>rowRail[y]/sw;

  let origLeft=0;
  {let in_=false; for(let x=0;x<sw>>1;x++){if(!in_&&cFrac(x)>HIGH)in_=true; if(in_&&cFrac(x)<LOW){origLeft=x-1;break;}}}
  let origRight=sw;
  {let in_=false; for(let x=sw-1;x>sw>>1;x--){if(!in_&&cFrac(x)>HIGH)in_=true; if(in_&&cFrac(x)<LOW){origRight=x+1;break;}}}
  let origTop=0;
  {let in_=false; for(let y=0;y<sh>>1;y++){if(!in_&&rFrac(y)>HIGH)in_=true; if(in_&&rFrac(y)<LOW){origTop=y-1;break;}}}
  let origBottom=sh;
  {let in_=false; for(let y=sh-1;y>sh>>1;y--){if(!in_&&rFrac(y)>HIGH)in_=true; if(in_&&rFrac(y)<LOW){origBottom=y+1;break;}}}

  // Connected-component flood-fill pocket detection.
  // Every black pixel belongs to exactly one blob; the 6 largest blobs are pockets.
  // Smaller blobs (decorative frame elements) are discarded automatically.
  const blackFlat=new Uint8Array(sw*sh);
  for(let y=0;y<sh;y++) for(let x=0;x<sw;x++) if(data[(y*sw+x)*4]<30&&data[(y*sw+x)*4+1]<30&&data[(y*sw+x)*4+2]<30) blackFlat[y*sw+x]=1;

  const visited=new Uint8Array(sw*sh);
  const clusters=[];
  const queue=new Int32Array(sw*sh); // reusable BFS queue
  for(let start=0;start<sw*sh;start++){
    if(!blackFlat[start]||visited[start]) continue;
    visited[start]=1;
    let qi=0,qe=0, sumX=0,sumY=0,n=0;
    queue[qe++]=start;
    while(qi<qe){
      const idx=queue[qi++];
      const cx=idx%sw, cy=(idx/sw)|0;
      sumX+=cx; sumY+=cy; n++;
      if(cx>0    &&!visited[idx-1] &&blackFlat[idx-1]) {visited[idx-1]=1; queue[qe++]=idx-1;}
      if(cx<sw-1 &&!visited[idx+1] &&blackFlat[idx+1]) {visited[idx+1]=1; queue[qe++]=idx+1;}
      if(cy>0    &&!visited[idx-sw]&&blackFlat[idx-sw]){visited[idx-sw]=1;queue[qe++]=idx-sw;}
      if(cy<sh-1 &&!visited[idx+sw]&&blackFlat[idx+sw]){visited[idx+sw]=1;queue[qe++]=idx+sw;}
    }
    if(n>=20) clusters.push({cx:sumX/n, cy:sumY/n, n});
  }
  clusters.sort((a,b)=>b.n-a.n);
  const pockets6=clusters.slice(0,6);
  const avgArea=pockets6.reduce((s,c)=>s+c.n,0)/6;
  const pRScaled=Math.sqrt(avgArea/Math.PI);

  // Mirror x-coordinates to match the horizontal flip applied in drawTable().
  // A pixel at original x appears at screen x = W*(1 - x/sw) after the flip.
  // So: visual left wall  = 1 - origRight/sw
  //     visual right wall = 1 - origLeft/sw   (width is preserved)
  return{
    feltNX:(sw-origRight)/sw,
    feltNY:origTop/sh,
    feltNW:(origRight-origLeft)/sw,
    feltNH:(origBottom-origTop)/sh,
    pockets:pockets6.map(c=>({nx:1-c.cx/sw, ny:c.cy/sh})),
    pocketRFrac:pRScaled/sw,
  };
}

/* ════════════════════════════════════════════════════
   LAYOUT
════════════════════════════════════════════════════ */
function resize(){
  const sw=window.innerWidth, sh=window.innerHeight-HUD_H, mg=10;
  const aw=sw-mg*2, ah=sh-mg*2;
  // Fit table.png aspect ratio into available space
  const cW=aw/CANVAS_AR<=ah ? aw : ah*CANVAS_AR;
  W=Math.round(cW); H=Math.round(cW/CANVAS_AR);
  canvas.width=W; canvas.height=H;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  // Derive physics bounds from calibration fractions (or safe fallback)
  if(tableCalib){
    tX=Math.round(tableCalib.feltNX*W);
    tY=Math.round(tableCalib.feltNY*H);
    tW=Math.round(tableCalib.feltNW*W);
    tH=Math.round(tableCalib.feltNH*H);
  } else {
    // Fallback: assume felt occupies the central ~74%×80% of canvas
    tX=Math.round(W*0.13); tY=Math.round(H*0.10);
    tW=Math.round(W*0.74); tH=Math.round(H*0.80);
  }
  ballR=tW*BALL_R_FRAC;
  headX=tX+tW*0.25;
  buildPockets();
  for(const b of balls){
    b.x=tX+b.nx*tW; b.y=tY+b.ny*tH; b.r=ballR;
  }
}

function buildPockets(){
  if(tableCalib){
    pocketR=tableCalib.pocketRFrac*W;
    pockets=tableCalib.pockets.map(p=>({x:p.nx*W, y:p.ny*H}));
  } else {
    // Fallback: estimate pocket positions from felt bounds
    pocketR=tW*0.045;
    pockets=[
      {x:tX,        y:tY},
      {x:tX+tW,     y:tY},
      {x:tX+tW/2,   y:tY},
      {x:tX,        y:tY+tH},
      {x:tX+tW,     y:tY+tH},
      {x:tX+tW/2,   y:tY+tH},
    ];
  }
}

/* ════════════════════════════════════════════════════
   BALLS
════════════════════════════════════════════════════ */
function mkBall(num,nx,ny){
  return{num,nx,ny,x:tX+nx*tW,y:tY+ny*tH,vx:0,vy:0,r:ballR,active:true,potted:false,ang:0};
}

function rack(){
  balls=[];
  const fx=0.75,fy=0.5;
  const spX=(ballR*2.04)/tW;  // normalized spacing along tW axis
  const spY=(ballR*2.04)/tH;  // normalized spacing along tH axis (tW≠tH, must be separate)
  const s60=Math.sqrt(3)/2;
  const layout=[[1],[2,9],[3,8,10],[4,14,5,11],[7,13,6,12,15]]; // corners: 7(solid)+15(stripe) ✓
  for(let row=0;row<layout.length;row++){
    const ra=layout[row];
    for(let col=0;col<ra.length;col++){
      const nx=fx+row*spX*s60;
      const ny=fy+(col-(ra.length-1)/2)*spY;
      balls.push(mkBall(ra[col],nx,ny));
    }
  }
  // Cue ball NOT placed here — caller must place it (BIH kitchen or auto)
}

function getCue(){ return balls.find(b=>b.num===0&&b.active); }

/* ════════════════════════════════════════════════════
   PHYSICS
════════════════════════════════════════════════════ */
function physStep(){
  // Sub-step count: ensure no ball moves more than ballR per sub-step (prevents tunnelling)
  let maxSpd=0;
  for(const b of balls) if(b.active) maxSpd=Math.max(maxSpd,Math.hypot(b.vx,b.vy));
  const steps=Math.max(1,Math.ceil(maxSpd/ballR));
  const inv=1/steps;

  for(let s=0;s<steps;s++){
    // Save positions before moving (needed for swept-segment pocket CCD)
    for(const b of balls) if(b.active){ b.px=b.x; b.py=b.y; }
    // Move (fractional)
    for(const b of balls){
      if(!b.active) continue;
      b.x+=b.vx*inv; b.y+=b.vy*inv;
      b.ang+=Math.hypot(b.vx,b.vy)*inv*0.22;
      wallBounce(b);
    }
    // Ball-ball collisions
    for(let i=0;i<balls.length-1;i++){
      if(!balls[i].active) continue;
      for(let j=i+1;j<balls.length;j++){
        if(!balls[j].active) continue;
        resolvePair(balls[i],balls[j]);
      }
    }
    // Pocket check — swept segment CCD: test closest point on path to each pocket,
    // so fast balls cannot tunnel through a pocket between sub-steps.
    for(const b of balls){
      if(!b.active) continue;
      for(const p of pockets){
        const dx=b.x-b.px, dy=b.y-b.py;
        const len2=dx*dx+dy*dy;
        let d2;
        if(len2<0.001){
          d2=(b.x-p.x)**2+(b.y-p.y)**2;
        } else {
          const t=Math.max(0,Math.min(1,((p.x-b.px)*dx+(p.y-b.py)*dy)/len2));
          const cx=b.px+t*dx, cy=b.py+t*dy;
          d2=(cx-p.x)**2+(cy-p.y)**2;
        }
        if(d2<pocketR*pocketR){ sinkBall(b); break; }
      }
    }
  }

  // Friction + stop threshold applied once per frame (not per sub-step)
  for(const b of balls){
    if(!b.active) continue;
    b.vx*=FRICTION; b.vy*=FRICTION;
    const spd=Math.hypot(b.vx,b.vy);
    if(spd<MIN_SPEED){b.vx=0;b.vy=0;}
  }

  // Rail detection
  if(gs==='animating'&&firstHit!==null){
    for(const b of balls){
      if(!b.active) continue;
      if(b.x<=tX+b.r+2||b.x>=tX+tW-b.r-2||
         b.y<=tY+b.r+2||b.y>=tY+tH-b.r-2) railHit=true;
    }
  }
}

function wallBounce(b){
  const nearP=pockets.some(p=>Math.hypot(b.x-p.x,b.y-p.y)<pocketR*1.1);
  if(nearP) return;
  let hit=false;
  if(b.x-b.r<tX){ b.x=tX+b.r; b.vx=Math.abs(b.vx)*CUSHION_REST; hit=true; }
  if(b.x+b.r>tX+tW){ b.x=tX+tW-b.r; b.vx=-Math.abs(b.vx)*CUSHION_REST; hit=true; }
  if(b.y-b.r<tY){ b.y=tY+b.r; b.vy=Math.abs(b.vy)*CUSHION_REST; hit=true; }
  if(b.y+b.r>tY+tH){ b.y=tY+tH-b.r; b.vy=-Math.abs(b.vy)*CUSHION_REST; hit=true; }
  if(hit){ const n=performance.now(); if(n-lastCushionSnd>80){lastCushionSnd=n;sndCushion();} }
}

function resolvePair(a,b){
  const dx=b.x-a.x, dy=b.y-a.y;
  const d=Math.hypot(dx,dy), mn=a.r+b.r;
  if(d>=mn||d<0.001) return;
  // Track first contact
  if(gs==='animating'&&firstHit===null){
    if(a.num===0) firstHit=b.num;
    else if(b.num===0) firstHit=a.num;
  }
  const nx=dx/d, ny=dy/d;
  const ov=(mn-d)*0.5;
  a.x-=nx*ov; a.y-=ny*ov;
  b.x+=nx*ov; b.y+=ny*ov;
  a.nx=(a.x-tX)/tW; a.ny=(a.y-tY)/tH;
  b.nx=(b.x-tX)/tW; b.ny=(b.y-tY)/tH;
  const dvx=a.vx-b.vx, dvy=a.vy-b.vy;
  const dot=dvx*nx+dvy*ny;
  if(dot<=0) return;
  const n2=performance.now();
  if(n2-lastBallSnd>80){ lastBallSnd=n2; sndHit(Math.min(1,dot/8)); }
  const imp=dot*BALL_REST;
  a.vx-=imp*nx; a.vy-=imp*ny;
  b.vx+=imp*nx; b.vy+=imp*ny;
}

function sinkBall(b){
  b.active=false; b.potted=true; b.vx=0; b.vy=0;
  pottedNow.push(b.num);
  b.nx=(b.x-tX)/tW; b.ny=(b.y-tY)/tH;
  // Find nearest pocket for drop animation
  const nearP=pockets.reduce((best,p)=>{
    const d=Math.hypot(b.x-p.x,b.y-p.y);
    return d<best.d?{d,p}:best;
  },{d:Infinity,p:pockets[0]}).p;
  b.sinking=true; b.sinkMs=performance.now();
  b.sinkX=b.x; b.sinkY=b.y;
  b.sinkPx=nearP.x; b.sinkPy=nearP.y;
  sndPocket();
}

function allStopped(){
  return balls.every(b=>!b.active||(Math.abs(b.vx)<0.01&&Math.abs(b.vy)<0.01));
}

/* ════════════════════════════════════════════════════
   SHOOT
════════════════════════════════════════════════════ */
function shoot(power,angle){
  const cue=getCue(); if(!cue) return;
  cue.vx=Math.cos(angle)*power;
  cue.vy=Math.sin(angle)*power;
  pottedNow=[]; hasFoul=false;
  firstHit=null; railHit=false;
  gs='animating';
}

/* ════════════════════════════════════════════════════
   RULES
════════════════════════════════════════════════════ */
function afterShot(){
  const cuePot =pottedNow.includes(0);
  const eightPot=pottedNow.includes(8);
  let foulReason=null;

  if(cuePot){
    foulReason='Scratch — ball in hand';
  }else if(firstHit===null){
    foulReason='No ball contacted — foul';
  }else if(!tableOpen&&!breakShot){
    const mg=groups[curP];
    if(mg==='solids'  &&!SOLIDS.includes(firstHit) &&firstHit!==8) foulReason='Wrong ball first — foul';
    if(mg==='stripes' &&!STRIPES.includes(firstHit)&&firstHit!==8) foulReason='Wrong ball first — foul';
    if((mg==='solids'||mg==='stripes')&&firstHit===8&&!myGroupClear()) foulReason='8-ball first — foul';
  }
  if(!foulReason&&!breakShot&&firstHit!==null){
    if(pottedNow.filter(n=>n!==0).length===0&&!railHit) foulReason='No rail/pocket after contact — foul';
  }

  hasFoul=!!foulReason;

  if(eightPot){
    if(breakShot){ silentRack(); return; }
    if(hasFoul||!myGroupClear()) endGame(curP===1?2:1);
    else endGame(curP);
    return;
  }

  if(hasFoul){
    showFoul(foulReason);
    restoreCue();
    switchP(true, breakShot&&cuePot); // kitchen BIH only on break scratch
    breakShot=false;
    return;
  }

  // Group assignment
  if(tableOpen&&!breakShot){
    const ms=pottedNow.filter(n=>SOLIDS.includes(n));
    const mx=pottedNow.filter(n=>STRIPES.includes(n));
    if(ms.length>0||mx.length>0){
      if(ms.length>=mx.length&&ms.length>0){
        groups[curP]='solids'; groups[curP===1?2:1]='stripes';
      }else if(mx.length>0){
        groups[curP]='stripes'; groups[curP===1?2:1]='solids';
      }
      tableOpen=false;
    }
  }

  let cont=false;
  if(breakShot){
    cont=pottedNow.filter(n=>n!==0).length>0;
    breakShot=false; tableOpen=true;
  }else{
    const mg=groups[curP];
    if(mg==='solids')  cont=pottedNow.some(n=>SOLIDS.includes(n));
    else if(mg==='stripes') cont=pottedNow.some(n=>STRIPES.includes(n));
    else                    cont=pottedNow.some(n=>n!==0&&n!==8);
  }

  if(cont) { gs='playing'; cpuSchedule(); }
  else switchP(false);
  pottedNow=[];
  refreshHUD();
}

function myGroupClear(){
  const g=groups[curP]; if(!g) return false;
  const grp=g==='solids'?SOLIDS:STRIPES;
  return grp.every(n=>!balls.find(b=>b.num===n&&b.active));
}

function restoreCue(){
  let c=balls.find(b=>b.num===0);
  if(!c){ c=mkBall(0,0.18,0.5); balls.unshift(c); }
  else{ c.active=true; c.potted=false; c.vx=0; c.vy=0; }
}

function switchP(withBIH, inKitchen=false){
  curP=curP===1?2:1;
  if(withBIH){
    bih=true; bihPos=null; gs='ballInHand';
    kitchen=inKitchen;
    const bihEl=document.getElementById('bihh');
    bihEl.textContent=inKitchen
      ? 'Place the cue ball behind the head string (kitchen)'
      : 'Tap anywhere on the table to place the cue ball';
    bihEl.classList.add('show');
  }else{
    gs='playing';
  }
  refreshHUD();
  cpuSchedule();
}

function silentRack(){
  curP=1; groups={1:null,2:null};
  pottedNow=[]; hasFoul=false;
  breakShot=true; tableOpen=true;
  bih=false; kitchen=false; firstHit=null; railHit=false;
  rack();
  balls.unshift(mkBall(0,0.18,0.5)); // auto-place for re-rack
  gs='playing'; refreshHUD();
}

function showFoul(msg){
  const el=document.getElementById('fb');
  el.textContent='⚠ FOUL: '+msg;
  el.classList.add('show');
  clearTimeout(foulTmr);
  foulTmr=setTimeout(()=>el.classList.remove('show'),3200);
}

function endGame(wp){
  gs='gameover';
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  ov.querySelector('h1').style.display='none';
  ov.querySelector('.sub').style.display='none';
  let wt=document.getElementById('winText');
  if(!wt){
    wt=document.createElement('div');
    wt.id='winText';
    ov.insertBefore(wt,ov.querySelector('.obtn'));
  }
  wt.style.display='';
  wt.textContent='🎱 Player '+wp+' Wins!';
  ov.querySelector('.obtn').textContent='PLAY AGAIN';
}

/* ════════════════════════════════════════════════════
   CPU PLAYER  (player 2)
════════════════════════════════════════════════════ */
// Schedule the CPU to act after a short "thinking" pause.
// Guards against stale calls if the game state has moved on.
let cpuTimer=null;
function cpuSchedule(){
  if(curP!==2) return;
  clearTimeout(cpuTimer);
  cpuTimer=setTimeout(cpuAct, 800+Math.random()*500);
}
function cpuAct(){
  if(curP!==2) return;
  if(gs==='ballInHand') cpuPlaceCue();
  else if(gs==='playing') cpuShoot();
}

// Check whether a straight path between two points is clear of all balls
// except those listed in `skip`.
function pathClear(x1,y1,x2,y2,skip){
  const dx=x2-x1, dy=y2-y1, len=Math.hypot(dx,dy);
  if(len<0.001) return true;
  const nx=dx/len, ny=dy/len;
  for(const b of balls){
    if(!b.active||skip.includes(b)) continue;
    const ex=b.x-x1, ey=b.y-y1;
    const proj=ex*nx+ey*ny;
    if(proj<0||proj>len) continue;
    if(ex*ex+ey*ey-proj*proj < (ballR*2)**2) return false;
  }
  return true;
}

function cpuShoot(){
  const cue=getCue(); if(!cue) return;
  const g=groups[2];

  // Determine which balls the CPU is aiming for
  const alive=balls.filter(b=>b.active&&b.num!==0);
  const mySolids =alive.filter(b=>SOLIDS.includes(b.num));
  const myStripes=alive.filter(b=>STRIPES.includes(b.num));
  let targets;
  if(g==='solids')       targets=mySolids;
  else if(g==='stripes') targets=myStripes;
  else                   targets=alive.filter(b=>b.num!==8);  // table open

  // If CPU cleared its group, go for the 8
  const grpClear=(g==='solids'&&mySolids.length===0)||(g==='stripes'&&myStripes.length===0);
  if(!tableOpen&&grpClear) targets=alive.filter(b=>b.num===8);
  if(targets.length===0)   targets=alive.filter(b=>b.num!==8);
  if(targets.length===0)   return;

  // Evaluate every target-ball × pocket combination via ghost-ball geometry
  let bestShot=null, bestScore=-Infinity;
  for(const ball of targets){
    for(const p of pockets){
      // Unit vector: ball → pocket (desired object-ball exit direction)
      const bpDx=p.x-ball.x, bpDy=p.y-ball.y;
      const bpLen=Math.hypot(bpDx,bpDy); if(bpLen<0.001) continue;
      const bpNx=bpDx/bpLen, bpNy=bpDy/bpLen;

      // Ghost-ball position: where the cue-ball centre must be at contact
      const gx=ball.x-bpNx*ballR*2, gy=ball.y-bpNy*ballR*2;

      // Direction cue → ghost
      const cgDx=gx-cue.x, cgDy=gy-cue.y;
      const cgLen=Math.hypot(cgDx,cgDy); if(cgLen<ballR) continue;

      // Reject if cue path or ball-to-pocket path is blocked
      if(!pathClear(cue.x,cue.y,gx,gy,[cue,ball])) continue;
      if(!pathClear(ball.x,ball.y,p.x,p.y,[ball]))  continue;

      // Score: prefer short cue travel + short ball travel
      const score=1/(cgLen+1)+0.5/(bpLen+1);
      if(score>bestScore){ bestScore=score; bestShot={angle:Math.atan2(cgDy,cgDx),cgLen}; }
    }
  }

  if(bestShot){
    const noise=(Math.random()-0.5)*0.09; // ≈ ±5° imperfection
    const power=Math.min(MAX_POWER, 5+bestShot.cgLen/tW*MAX_POWER*1.1);
    shoot(power, bestShot.angle+noise);
  } else {
    // No clean shot — nudge the nearest target loosely toward a pocket
    const nearest=targets.reduce((a,b)=>
      Math.hypot(b.x-cue.x,b.y-cue.y)<Math.hypot(a.x-cue.x,a.y-cue.y)?b:a);
    const angle=Math.atan2(nearest.y-cue.y,nearest.x-cue.x)+(Math.random()-0.5)*0.4;
    shoot(MAX_POWER*0.55, angle);
  }
}

function cpuPlaceCue(){
  // Try random positions; place in kitchen when required, anywhere otherwise
  for(let i=0;i<300;i++){
    const x=kitchen
      ? tX+ballR+(Math.random()*(headX-tX-ballR*2))
      : tX+ballR+(Math.random()*(tW-ballR*2));
    const y=tY+ballR+Math.random()*(tH-ballR*2);
    if(validBIH(x,y)){ placeCue(x,y); return; }
  }
  // Absolute fallback
  placeCue(kitchen?tX+ballR*2:tX+tW*0.5, tY+tH*0.5);
}

/* ════════════════════════════════════════════════════
   START
════════════════════════════════════════════════════ */
function startGame(){
  const ov=document.getElementById('overlay');
  ov.style.display='none';
  const h1=ov.querySelector('h1'), sub=ov.querySelector('.sub');
  if(h1) h1.style.display='';
  if(sub) sub.style.display='';
  const wt=document.getElementById('winText');
  if(wt) wt.style.display='none';
  ov.querySelector('.obtn').textContent='BREAK!';
  curP=1; groups={1:null,2:null};
  pottedNow=[]; hasFoul=false;
  breakShot=true; tableOpen=true;
  bih=false; bihPos=null; kitchen=false;
  firstHit=null; railHit=false;
  aiming=false; settling=false; strikeAnim=null;
  rack();
  // Kitchen BIH for break placement
  bih=true; kitchen=true; gs='ballInHand';
  const bihEl=document.getElementById('bihh');
  bihEl.textContent='Place the cue ball behind the head string (kitchen)';
  bihEl.classList.add('show');
  refreshHUD();
}

/* ════════════════════════════════════════════════════
   DRAW
════════════════════════════════════════════════════ */
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality='high';
  ctx.fillStyle='#0f0a04';
  ctx.fillRect(0,0,W,H);
  drawTable();
  // Head string line during kitchen BIH
  if(bih&&kitchen){
    ctx.save();
    ctx.strokeStyle='rgba(255,255,255,.45)'; ctx.lineWidth=1.5; ctx.setLineDash([6,5]);
    ctx.beginPath(); ctx.moveTo(headX,tY); ctx.lineTo(headX,tY+tH); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
  }
  for(const b of balls) if(b.active||b.sinking) drawBall(b);
  drawCue();
  if(bih) drawBIH();
}

/* Table */
function drawTable(){
  if(sprTable&&sprTable.complete&&sprTable.naturalWidth>0){
    ctx.save();
    ctx.translate(W,0); ctx.scale(-1,1);
    ctx.drawImage(sprTable,0,0,W,H);
    ctx.restore();
  }else{
    // Fallback: plain felt + rail rectangles
    const railW=tW*0.13, railH=tH*0.125;
    ctx.fillStyle='#4e2508';
    rRect(tX-railW,tY-railH,tW+railW*2,tH+railH*2,8);
    ctx.fill();
    ctx.strokeStyle='#7a4818'; ctx.lineWidth=3;
    rRect(tX-railW+2,tY-railH+2,tW+railW*2-4,tH+railH*2-4,7);
    ctx.stroke();
    const fg=ctx.createLinearGradient(tX,tY,tX+tW,tY+tH);
    fg.addColorStop(0,'#1a6b35');fg.addColorStop(.5,'#1d7a3a');fg.addColorStop(1,'#166030');
    ctx.fillStyle=fg; ctx.fillRect(tX,tY,tW,tH);
  }
}

function rRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}


/* Balls */
function drawBall(b){
  // Sinking (pocket-drop) animation
  let bx=b.x, by=b.y, sc=1, al=1;
  if(b.sinking){
    const p=Math.min(1,(performance.now()-b.sinkMs)/SINK_MS);
    if(p>=1){ b.sinking=false; return; }
    bx=b.sinkX+(b.sinkPx-b.sinkX)*p;
    by=b.sinkY+(b.sinkPy-b.sinkY)*p;
    sc=1-p; al=1-p;
  }
  ctx.save();
  ctx.globalAlpha=al;
  ctx.translate(bx,by);
  ctx.scale(sc,sc);
  if(!b.sinking){
    const sg=ctx.createRadialGradient(0,0,b.r*0.6,0,0,b.r);
    sg.addColorStop(0,'rgba(0,0,0,0)');
    sg.addColorStop(1,'rgba(0,0,0,0.35)');
    ctx.beginPath(); ctx.arc(0,0,b.r,0,Math.PI*2);
    ctx.fillStyle=sg; ctx.fill();
  }
  ctx.rotate(b.ang);
  const sp=sprBalls[b.num];
  if(sp&&sp.complete&&sp.naturalWidth>0){
    ctx.drawImage(sp,-b.r,-b.r,b.r*2,b.r*2);
  }else{
    drawBallFB(b);
  }
  ctx.restore();
}

function drawBallFB(b){
  const n=b.num,r=b.r,col=BCOL[n]||'#fff';
  const isS=STRIPES.includes(n);
  if(n===0){
    const g=ctx.createRadialGradient(-r*.3,-r*.35,r*.05,0,0,r);
    g.addColorStop(0,'#fff'); g.addColorStop(1,'#ccc');
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
  }else if(isS){
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fillStyle='#f5f3ec'; ctx.fill();
    ctx.save(); ctx.rotate(b.ang);
    ctx.beginPath();
    ctx.arc(0,0,r,-Math.PI*.38,Math.PI*.38);
    ctx.arc(0,0,r,Math.PI*.62,Math.PI*1.38);
    ctx.closePath();
    ctx.fillStyle=col; ctx.fill(); ctx.restore();
  }else{
    const g=ctx.createRadialGradient(-r*.3,-r*.35,r*.05,0,0,r);
    g.addColorStop(0,lgt(col,55)); g.addColorStop(1,col);
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
  }
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,0,0,.28)'; ctx.lineWidth=1.5; ctx.stroke();
  if(n!==0){
    ctx.beginPath(); ctx.arc(0,0,r*.44,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.88)'; ctx.fill();
    ctx.fillStyle='#111';
    ctx.font='bold '+r*.58+'px Arial';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(n,0,0);
  }
  ctx.beginPath(); ctx.arc(-r*.28,-r*.32,r*.22,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.2)'; ctx.fill();
}

function lgt(hex,a){
  const n=parseInt(hex.replace('#',''),16);
  return `rgb(${Math.min(255,(n>>16)+a)},${Math.min(255,((n>>8)&0xff)+a)},${Math.min(255,(n&0xff)+a)})`;
}

/* Cue — slingshot + strike animation + aim guides */
function _drawStick(tipX,tipY,dragAngle,cueL,alpha){
  ctx.save(); ctx.globalAlpha=alpha;
  if(sprCue&&sprCue.complete&&sprCue.naturalWidth>0){
    ctx.translate(tipX,tipY); ctx.rotate(dragAngle);
    const ch=cueL*0.13;
    ctx.drawImage(sprCue,0,-ch/2,cueL,ch);
  }else{
    const bx=tipX+Math.cos(dragAngle)*cueL;
    const by=tipY+Math.sin(dragAngle)*cueL;
    const g2=ctx.createLinearGradient(tipX,tipY,bx,by);
    g2.addColorStop(0,'#d0e8f8'); g2.addColorStop(.08,'#c8a030');
    g2.addColorStop(.5,'#d8b448'); g2.addColorStop(1,'#3a1a06');
    ctx.strokeStyle=g2; ctx.lineWidth=6; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(tipX,tipY); ctx.lineTo(bx,by); ctx.stroke();
  }
  ctx.restore();
}

function drawCue(){
  const cue=getCue();
  const striking=strikeAnim&&(performance.now()-strikeAnim.startMs<STRIKE_MS);

  // Strike animation (cue snaps forward after shot fires)
  if(striking&&cue){
    const p=Math.min(1,(performance.now()-strikeAnim.startMs)/STRIKE_MS);
    const tipDist=strikeAnim.tipDist0*(1-p)+ballR*1.3*p;
    const tx=strikeAnim.cx+Math.cos(strikeAnim.dragAngle)*tipDist;
    const ty=strikeAnim.cy+Math.sin(strikeAnim.dragAngle)*tipDist;
    _drawStick(tx,ty,strikeAnim.dragAngle,tW*0.46,1-p);
    return;
  }
  if(strikeAnim&&!striking) strikeAnim=null;

  if(gs!=='playing'||!aiming||!aimPos||!cue) return;

  const dx=cue.x-aimPos.x, dy=cue.y-aimPos.y;
  const pullDist=Math.hypot(dx,dy);
  if(pullDist<1) return;

  const shootAngle=Math.atan2(dy,dx);   // from pull point → cue ball → target
  const dragAngle =shootAngle+Math.PI;  // from cue ball → pull point

  const powerFrac=Math.min(1,pullDist/(tW*0.28));
  document.getElementById('pwf').style.width=(powerFrac*100)+'%';

  const cdx=Math.cos(shootAngle), cdy=Math.sin(shootAngle);
  const hit=findFirstHit(cue.x,cue.y,cdx,cdy);
  const cueL=tW*0.46;
  const tipDist=ballR*1.3+powerFrac*ballR*5;
  const tipX=cue.x+Math.cos(dragAngle)*tipDist;
  const tipY=cue.y+Math.sin(dragAngle)*tipDist;

  ctx.save();

  if(hit){
    const gx=cue.x+cdx*hit.t, gy=cue.y+cdy*hit.t;

    // Cue ball path: from cue to ghost position
    ctx.strokeStyle='rgba(255,255,255,.28)'; ctx.lineWidth=1; ctx.setLineDash([9,7]);
    ctx.beginPath();
    ctx.moveTo(cue.x+cdx*ballR*1.1, cue.y+cdy*ballR*1.1);
    ctx.lineTo(gx, gy);
    ctx.stroke(); ctx.setLineDash([]);

    // Ghost ball
    ctx.beginPath(); ctx.arc(gx,gy,ballR,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,.28)'; ctx.lineWidth=1.5; ctx.stroke();

    // Line of centres → object ball direction
    const locDx=hit.ball.x-gx, locDy=hit.ball.y-gy;
    const locLen=Math.hypot(locDx,locDy)||1;
    const lnx=locDx/locLen, lny=locDy/locLen;

    // Object ball trajectory (yellow-ish dashed)
    ctx.strokeStyle='rgba(255,210,55,.4)'; ctx.lineWidth=1.5; ctx.setLineDash([8,6]);
    ctx.beginPath();
    ctx.moveTo(hit.ball.x, hit.ball.y);
    ctx.lineTo(hit.ball.x+lnx*tW*0.55, hit.ball.y+lny*tW*0.55);
    ctx.stroke(); ctx.setLineDash([]);

    // Cue ball tangent (90° to LOC — stun-shot approximation)
    const cross=cdx*lny-cdy*lnx;
    const tnx=cross>0? lny:-lny, tny=cross>0?-lnx: lnx;
    ctx.strokeStyle='rgba(255,255,255,.18)'; ctx.lineWidth=1; ctx.setLineDash([5,8]);
    ctx.beginPath();
    ctx.moveTo(gx, gy);
    ctx.lineTo(gx+tnx*tW*0.3, gy+tny*tW*0.3);
    ctx.stroke(); ctx.setLineDash([]);
  }else{
    // No object ball in path — plain aim line + ghost ball near end
    ctx.strokeStyle='rgba(255,255,255,.28)'; ctx.lineWidth=1; ctx.setLineDash([9,7]);
    ctx.beginPath();
    ctx.moveTo(cue.x+cdx*ballR*1.1, cue.y+cdy*ballR*1.1);
    ctx.lineTo(cue.x+cdx*tW*0.9,    cue.y+cdy*tW*0.9);
    ctx.stroke(); ctx.setLineDash([]);
    ctx.beginPath();
    ctx.arc(cue.x+cdx*ballR*2.8, cue.y+cdy*ballR*2.8, ballR, 0, Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,.2)'; ctx.lineWidth=1.5; ctx.stroke();
  }

  ctx.restore();
  _drawStick(tipX,tipY,dragAngle,cueL,1);
}

/* Ball-in-hand ghost */
function drawBIH(){
  if(!bihPos) return;
  ctx.save(); ctx.globalAlpha=0.52;
  ctx.beginPath(); ctx.arc(bihPos.x,bihPos.y,ballR,0,Math.PI*2);
  ctx.fillStyle='#f5f4ee'; ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
  ctx.restore();
}

/* ════════════════════════════════════════════════════
   HUD
════════════════════════════════════════════════════ */
function refreshHUD(){
  document.getElementById('pi1').className='pi'+(curP===1?' act':'');
  document.getElementById('pi2').className='pi'+(curP===2?' act':'');
  document.getElementById('br1').innerHTML=bRow(1);
  document.getElementById('br2').innerHTML=bRow(2);
  const ti=document.getElementById('ti');
  if(breakShot)    ti.textContent='Player '+curP+' — Break!';
  else if(tableOpen) ti.textContent='Player '+curP+' — Open table';
  else{
    const g=groups[curP];
    ti.textContent='P'+curP+(g==='solids'?' ● Solids':g==='stripes'?' ○ Stripes':'');
  }
}

function bRow(p){
  const g=groups[p];
  if(!g) return '<span style="color:#443322;font-size:.75em">TBD</span>';
  const grp=g==='solids'?SOLIDS:STRIPES;
  return grp.map(n=>{
    const b=balls.find(x=>x.num===n);
    const dead=!b||!b.active;
    return`<span class="bd" style="background:${dead?'#2a2018':BCOL[n]};opacity:${dead?.28:1};border-color:${dead?'#333':'rgba(255,255,255,.3)'}"></span>`;
  }).join('');
}

/* ════════════════════════════════════════════════════
   INPUT
════════════════════════════════════════════════════ */
function cxy(e){
  const rect=canvas.getBoundingClientRect();
  const sx=canvas.width/rect.width, sy=canvas.height/rect.height;
  const src=e.touches?e.touches[0]:e;
  return{x:(src.clientX-rect.left)*sx,y:(src.clientY-rect.top)*sy};
}

function onDn(e){
  e.preventDefault();
  if(gs==='animating'||gs==='settling'||gs==='menu'||gs==='gameover') return;
  const pos=cxy(e);
  if(gs==='ballInHand'){
    if(validBIH(pos.x,pos.y)) placeCue(pos.x,pos.y);
    return;
  }
  if(gs!=='playing') return;
  const cue=getCue(); if(!cue) return;
  aiming=true; aimPos=pos;
  document.getElementById('pw').classList.add('show');
}

function onMv(e){
  e.preventDefault();
  const pos=cxy(e);
  if(gs==='ballInHand'){ bihPos=validBIH(pos.x,pos.y)?pos:null; return; }
  if(!aiming) return;
  aimPos=pos;
}

function onUp(e){
  e.preventDefault();
  document.getElementById('pw').classList.remove('show');
  document.getElementById('pwf').style.width='0%';
  if(!aiming) return;
  aiming=false;
  if(gs!=='playing') return;
  const cue=getCue(); if(!cue||!aimPos) return;
  const dx=cue.x-aimPos.x, dy=cue.y-aimPos.y;
  const dist=Math.hypot(dx,dy);
  if(dist<ballR*0.5) return; // ignore accidental taps
  const angle=Math.atan2(dy,dx);
  const dragAngle=angle+Math.PI;
  const powerFrac=Math.min(1,dist/(tW*0.28));
  const power=powerFrac*MAX_POWER;
  // Store strike animation params before shoot() clears cue velocity
  strikeAnim={
    cx:cue.x, cy:cue.y,
    dragAngle,
    tipDist0:ballR*1.3+powerFrac*ballR*5,
    startMs:performance.now()
  };
  shoot(power,angle);
}

function validBIH(x,y){
  if(x<tX+ballR||x>tX+tW-ballR||y<tY+ballR||y>tY+tH-ballR) return false;
  if(kitchen&&x>=headX) return false; // must stay in kitchen (behind head string)
  for(const b of balls){
    if(b.num===0||!b.active) continue;
    if(Math.hypot(x-b.x,y-b.y)<ballR*2.15) return false;
  }
  for(const p of pockets){
    if(Math.hypot(x-p.x,y-p.y)<pocketR*.9) return false;
  }
  return true;
}

function placeCue(x,y){
  let c=balls.find(b=>b.num===0);
  if(!c){ c=mkBall(0,0,0); balls.unshift(c); }
  c.x=x; c.y=y; c.nx=(x-tX)/tW; c.ny=(y-tY)/tH;
  c.vx=0; c.vy=0; c.active=true; c.potted=false;
  bih=false; bihPos=null; kitchen=false; gs='playing';
  document.getElementById('bihh').classList.remove('show');
  refreshHUD();
}

['mousedown','touchstart'].forEach(ev=>canvas.addEventListener(ev,onDn,{passive:false}));
['mousemove','touchmove' ].forEach(ev=>canvas.addEventListener(ev,onMv,{passive:false}));
['mouseup',  'touchend'  ].forEach(ev=>canvas.addEventListener(ev,onUp,{passive:false}));

/* ════════════════════════════════════════════════════
   LOOP
════════════════════════════════════════════════════ */
const PHYS_DT=1000/120;
let physAcc=0, lastTs=0;

function loop(ts){
  const dt=Math.min(ts-lastTs,50); lastTs=ts;

  if(gs==='animating'){
    physAcc+=dt;
    while(physAcc>=PHYS_DT){ physStep(); physAcc-=PHYS_DT; }
    if(!settling&&allStopped()){
      settling=true; gs='settling';
      setTimeout(()=>{ settling=false; afterShot(); },120);
    }
  }

  draw();
  requestAnimationFrame(loop);
}

window.addEventListener('resize',()=>{ resize(); refreshHUD(); });
window.addEventListener('orientationchange',()=>setTimeout(resize,250));

(async()=>{
  resize();
  await loadAssets();
  lastTs=performance.now();
  requestAnimationFrame(loop);
})();
</script>
